<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=1.1">
    <title>Register Student - Purple Edition</title>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            margin: 0; 
            min-height: 100vh;
            transition: 0.4s; 
        }
        .navbar-custom { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px);
            padding: 12px 20px; 
            display: flex; 
            align-items: center; 
            gap: 20px; 
            color: white; 
            border-bottom: 3px solid #667eea; 
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }
        .navbar-custom a { 
            color: #4a5568; 
            text-decoration: none; 
            font-weight: 600; 
            padding: 8px 15px; 
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .navbar-custom a.active { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; 
        }
        .navbar-custom a:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        /* Sidebar Styling */
        .sidebar { 
            height: 100%; 
            width: 0; 
            position: fixed; 
            z-index: 1001; 
            top: 0; 
            left: 0; 
            background: rgba(26, 32, 44, 0.95); 
            backdrop-filter: blur(10px);
            overflow-x: hidden; 
            transition: 0.4s; 
            padding-top: 60px; 
            box-shadow: 4px 0 15px rgba(0,0,0,0.5);
            border-right: 3px solid #667eea;
        }
        .sidebar a { 
            padding: 15px 25px; 
            text-decoration: none; 
            font-size: 18px; 
            color: #cbd5e0; 
            display: block; 
            transition: 0.3s; 
            border-left: 4px solid transparent;
        }
        .sidebar a:hover { 
            color: #667eea; 
            background: rgba(45, 55, 72, 0.8); 
            padding-left: 35px;
            border-left: 4px solid #667eea;
        }
        .sidebar .closebtn { 
            position: absolute; 
            top: 10px; 
            right: 25px; 
            font-size: 36px; 
            color: white; 
            cursor: pointer; 
        }
        
        .container { 
            max-width: 600px; 
            margin: 50px auto; 
            padding: 20px; 
        }
        .form-card { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px);
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.1); 
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-top: 5px solid #667eea; 
            transition: all 0.3s ease;
        }
        .form-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
        }
        .open-btn { 
            font-size: 25px; 
            cursor: pointer; 
            background: none; 
            border: none; 
            color: #667eea; 
        }
        .open-btn:hover {
            color: #764ba2;
        }
        input, select { 
            width: 100%; 
            padding: 16px; 
            margin-bottom: 20px; 
            border: 2px solid #e2e8f0; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 16px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
        }
        input:focus, select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            outline: none;
        }
        .btn-submit { 
            width: 100%; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; 
            border: none; 
            padding: 16px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .btn-submit:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }
        h2 {
            text-align: center;
            color: #2d3748;
            margin-bottom: 30px;
            font-weight: 700;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .navbar-custom {
                padding: 10px 15px;
                font-size: 14px;
            }
            .navbar-custom a {
                padding: 6px 10px;
            }
            .container {
                max-width: 90%;
                padding: 20px;
            }
            .form-card {
                padding: 25px;
            }
            h2 {
                font-size: 24px;
            }
            input, select {
                padding: 14px;
                font-size: 16px;
            }
            .btn-submit {
                padding: 14px;
                font-size: 16px;
            }
        }

        @media (max-width: 480px) {
            .navbar-custom {
                padding: 8px 10px;
                font-size: 12px;
            }
            .navbar-custom a {
                padding: 5px 8px;
            }
            .container {
                max-width: 95%;
                padding: 15px;
            }
            .form-card {
                padding: 20px;
            }
            h2 {
                font-size: 20px;
            }
            input, select {
                padding: 12px;
                font-size: 16px;
                margin-bottom: 15px;
            }
            .btn-submit {
                padding: 12px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

<div id="mySidebar" class="sidebar">
    <span class="closebtn" onclick="closeNav()">&times;</span>
    <a href="/">Dashboard</a>
    <a href="/register">Add Student</a>
    <a href="/students">View Records</a>
    
    <form method="POST" action="{{ url_for('logout') }}" style="display: block; padding: 15px 25px;">
        <button type="submit" style="background: none; border: none; color: #cbd5e0; font-size: 18px; cursor: pointer; transition: 0.3s; border-left: 4px solid transparent; padding: 0;">Logout</button>
    </form>
</div>

<nav class="navbar-custom">
    <button class="open-btn" onclick="openNav()">&#9776;</button>
    <span style="font-weight: bold; color: #3182ce;">College event Hub</span>
    <a href="/">Home</a>
    <a href="/register" class="active">Add Students</a>
</nav>

<div class="container">
    <div class="form-card">
        <h2 style="text-align: center; color: #2d3748;">Student Registration</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div style="padding: 12px; background-color: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; border-radius: 8px; margin-bottom: 20px; text-align: center; font-weight: bold;">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}
{% endwith %}
        <form action="/register" method="POST">
            <input type="text" name="roll_no" placeholder="Roll Number" required>
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="text" name="branch" placeholder="Branch" required>
            <select name="year" required>
                <option value="" disabled selected>Select Year</option>
                <option value="1st Year">1st Year</option>
                <option value="2nd Year">2nd Year</option>
                <option value="3rd Year">3rd Year</option>
                <option value="4th Year">4th Year</option>
            </select>
            <input type="text" 
       name="phone" 
       id="phone"
       placeholder="Phone Number" 
       pattern="\d{10}" 
       title="Please enter exactly 10 digits" 
       oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10)" 
       required>
            <input type="text" name="event" placeholder="Event Name" required>
            <button type="submit" class="btn-submit">Register Student</button>
        </form>
    </div>
</div>

<script>
    function openNav() { document.getElementById("mySidebar").style.width = "280px"; }
    function closeNav() { document.getElementById("mySidebar").style.width = "0"; }
</script>
</body>
</html>
