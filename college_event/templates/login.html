<!DOCTYPE html>
<html>
<head>
    <title>Admin Login - Blue Edition</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #1a202c; /* Dark Black/Grey background */
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .login-card { 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            width: 100%;
            max-width: 380px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
            border-top: 6px solid #3182ce; /* Professional Blue Line */
            box-sizing: border-box;
        }
        h2 { text-align: center; color: #2d3748; margin-bottom: 25px; }
        label { font-size: 14px; color: #4a5568; font-weight: bold; }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0 20px 0; 
            border: 1px solid #e2e8f0; 
            border-radius: 8px; 
            box-sizing: border-box; 
        }
        .btn-login { 
            width: 100%; 
            background: #3182ce; 
            color: white; 
            padding: 12px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px;
            transition: 0.3s;
        }
        .btn-login:hover { background: #2b6cb0; }
        .msg { 
            padding: 10px; 
            background: #ebf8ff; 
            color: #2b6cb0; 
            border-radius: 8px; 
            text-align: center; 
            margin-bottom: 15px; 
            font-size: 14px;
            border: 1px solid #bee3f8;
        }
        .links { text-align: center; margin-top: 20px; font-size: 13px; }
        .links a { color: #3182ce; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Admin Login</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="msg">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/login" method="POST">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="Email Address" required>
            
            <label>Password</label>
            <input type="password" name="password" placeholder="Password" required>
            
            <button type="submit" class="btn-login">Login</button>
        </form>

        <div class="links">
            <p><a href="/forgot_password" style="color: #e53e3e;">Forgot Password?</a></p>
            <p style="color: #718096;">New Admin? <a href="/signup">Sign Up here</a></p>
        </div>
    </div>
</body>
</html>
